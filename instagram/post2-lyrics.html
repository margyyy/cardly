<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cardly — Post 2</title>
<style>
  @font-face {
    font-family: 'Archivo Black';
    src: url('../lycard-frontend/public/fonts/ArchivoBlack-latin.woff2') format('woff2');
    font-weight: 400;
    font-style: normal;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #888;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Archivo Black', sans-serif;
  }

  .canvas {
    background: #ffffff;
    width: 864px;
    height: 1080px;
    
    
    
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .center {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 12px;
    width: 520px;
  }

  .song-card {
    background: #fff;
    border: 2px solid #000;
    box-shadow: 3px 3px 0 0 #000;
    padding: 20px 24px;
  }

  .song-title {
    font-family: 'Archivo Black', sans-serif;
    font-size: 26px;
    letter-spacing: -0.3px;
    color: #000;
    line-height: 1.1;
  }

  .song-meta {
    font-family: 'Archivo Black', sans-serif;
    font-size: 13px;
    color: rgba(0,0,0,0.4);
    margin-top: 6px;
  }

  .lyrics {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .line {
    padding: 7px 12px;
    font-family: 'Archivo Black', sans-serif;
    font-size: 16px;
    line-height: 1.5;
    color: #000;
    border: 1px solid #000;
    background: #c4b8f0;
    transform: translateX(4px);
  }

  .generate-btn {
    padding: 11px 24px;
    border: 2px solid #000;
    background: #e7f193;
    font-family: 'Archivo Black', sans-serif;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    box-shadow: 3px 3px 0 0 #000;
    color: #000;
    align-self: flex-start;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="center">

      <div class="song-card">
        <div class="song-title">SICKO MODE</div>
        <div class="song-meta">Travis Scott — Astroworld</div>
      </div>

      <div class="lyrics">
        <div class="line">Sun is down, freezing cold</div>
        <div class="line">That's how we already know winter's here</div>
      </div>

      <button class="generate-btn">Generate →</button>

    </div>
  </div>
</body>
</html>
